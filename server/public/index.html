<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Couch Codes</title>
  </head>
  <body>
  <h1>Couch Codes</h1>

  <div id="join-screen">
    <div>
      <label>Player name</label>
      <input id="playerName" type="text" placeholder="Your name" />
    </div>

    <div>
      <label>Room code</label>
      <input id="roomCode" type="text" placeholder="1234" />
    </div>

    <div>
      <label>Role</label>
      <div>
        <button data-role="guesser">Guesser</button>
        <button data-role="clue">Clue Master</button>
        <button data-role="spectator">Spectator</button>
      </div>
    </div>

    <button id="joinBtn">Join Game</button>
  </div>

  <div id="game-screen" style="display:none;">
    <!-- later: player view with words -->
  </div>

  <script>
    document.getElementById("joinBtn").addEventListener("click", () => {
      const name = document.getElementById("playerName").value;
      const room = document.getElementById("roomCode").value;
      console.log("Join clicked:", { name, room });
      // later: send to server via Socket.io
    });
  </script>
</body>
</html>
