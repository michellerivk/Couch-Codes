<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Couch Codes</title>

    <link rel="stylesheet" href="styles.css"> <!-- Linking the css file -->

  </head>
  <body>
  <h1>Couch Codes</h1>

  <div id="join-screen">
    <div>
      <label>Player name</label>
      <input id="playerName" type="text" placeholder="Your name" /> <!-- A place to enter your name -->
    </div>

    <div>
      <label>Room code</label>
      <input id="roomCode" type="text" placeholder="1234" /> <!-- A place to enter your room code -->
    </div>

    <div> 
      <label>Choose your role:</label> <!-- Buttons to choose a role -->
      <div>
        <button data-role="guesser">Guesser</button>
        <button data-role="clue">Clue Master</button><br>

        <label for="team">Choose a team:</label><br>
        <select name="team" id="team">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
        </select>
        
      </div>
    </div>

    <button id="joinBtn">Join Game</button> <!-- Join game -->
    <p id="output"></p> <!-- Debugging: Place to present the input of the name -->
  </div>

  <div id="lobby-screen">
    <h2>Lobby</h2>
    <!-- fill in later -->
    <p id="lobby-info">Waiting for the host to start the game...</p>
  </div>

  <div id="guesser-screen"> 
    <h2>Game Started: Guesser</h2>

    <p id="turn-status" class="turn-status"></p> <!-- Show current status (Waiting for a guess for example) -->

    <div id="guesser-board" class="board-grid"></div>
    <button id="endGuessBtn" class="end-guess-btn"> End guessing </button>
  </div>

  <div id="clue-screen"> 
    <label>Game Started: Clue Master</label>

    <div id="clue-answer-board-wrapper">
      <h3>Answer Board</h3>
      <div id="clue-answer-board" class="board-grid clue-board"></div>
    </div>

    <div class="clue-controls">
  <div class="field">
    <label for="clueWord">Clue word</label>
    <input id="clueWord" type="text" placeholder="Your clue" autocomplete="off" />
  </div>

  <div class="field small">
    <label for="clueNumber">How many</label>
    <select name="clueNumber" id="clueNumber">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">infinity</option>
    </select>
  </div>

  <button id="submitClue" type="button" class="btn-clue">Submit clue</button>
</div>



  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script> 
    const socket = io(); // Connect to the same server that served this page

    let myRoom = null;
    let myRole = null;
    let myTeam = null;

    let canGuessNow = false; // Can the guesser guess?
    let canSubmitClueNow = false; // Can the clue master submit clue?

    const joinScreen    = document.getElementById("join-screen");
    const lobbyScreen   = document.getElementById("lobby-screen");
    const guesserScreen = document.getElementById("guesser-screen"); // The screen of the guesser
    const guesserBoard = document.getElementById("guesser-board"); // The board of guesser itself
    const clueAnswerBoard = document.getElementById("clue-answer-board"); // The board of the clue-master
    const clueScreen    = document.getElementById("clue-screen");
    const outputParagraph = document.getElementById("output");
    const lobbyInfo     = document.getElementById("lobby-info");
    const clueWordInput   = document.getElementById("clueWord");
    const clueNumberInput = document.getElementById("clueNumber");
    const submitClueBtn   = document.getElementById("submitClue");
    const turnStatusLabel = document.getElementById("turn-status"); // Waiting for a guess for example
    const endGuessBtn = document.getElementById("endGuessBtn");

    // Try to restore last session details
    let savedSession = null;
    let selectedRole = null;
    try 
    {
      const raw = localStorage.getItem("couchcodes_lastSession");
      if (raw) {
        savedSession = JSON.parse(raw);
      }
    } 
    catch (e) 
    {
      console.warn("Failed to load last session:", e);
    }

    if (savedSession) {
      outputParagraph.textContent =
        `Saved session found for room ${savedSession.room}. Press Join Game to reconnect, or edit fields to join a different room.`;
    }


    if (savedSession) {
      document.getElementById("playerName").value = savedSession.name || "";
      document.getElementById("roomCode").value = savedSession.room || "";
      document.getElementById("team").value = savedSession.team || "red";

      const targetRole = savedSession.role;
      if (targetRole) {
        const roleButtons = document.querySelectorAll("button[data-role]");
        roleButtons.forEach(btn => {
          btn.classList.toggle("selected", btn.dataset.role === targetRole);
        });
        selectedRole = targetRole;
      }
}

    socket.on("connect", () => {
      console.log("Connected to server with id:", socket.id);

      // Validate reconnectability
      if (savedSession?.room) {
        socket.emit("canReconnect", { room: savedSession.room });
      }
    });

    socket.on("disconnect", () => {
      console.log("Disconnected from server");
    });

    socket.on("canReconnectResult", ({ ok, reason }) => {
      if (!savedSession) return;

      if(!ok) {
        try { localStorage.removeItem("couchcodes_lastSession"); } catch (e) {}
        savedSession = null;
        console.log("Reconnect not allowed:", reason);
      }
    });


    socket.on("roomClosed", ({ room, reason }) => {
      // If this event is for a different room, ignore
      if (myRoom && room !== myRoom) return;

      console.log("roomClosed received for room:", room, "reason:", reason);

      // Inform the player
      alert("The host has left the game.\nThis room is now closed.");

      // Reset local state
      myRoom = null;
      myRole = null;
      myTeam = null;

      // Clear boards and labels
      if (guesserBoard) guesserBoard.innerHTML = "";
      if (clueAnswerBoard) clueAnswerBoard.innerHTML = "";
      if (turnStatusLabel) turnStatusLabel.textContent = "";
      if (outputParagraph) {
        outputParagraph.textContent = "Room closed by host. Join another room to keep playing.";
      }

      // Hide all game-related screens
      lobbyScreen.style.display = "none";
      guesserScreen.style.display = "none";
      clueScreen.style.display = "none";

      // Show the join screen again
      joinScreen.style.display = "block";

      try { localStorage.removeItem("couchcodes_lastSession"); } catch (e) {}
      savedSession = null;
    });


    socket.on("joinSuccess", ({ room, name, role, team }) => {
      console.log("joinSuccess:", room, name, role, team);

      // Remember info for when joining the actual room and not the lobby
      myRoom = room;
      myRole = role;
      myTeam = team;

      outputParagraph.textContent = `Joined room ${room} as ${team} ${role}`;

      // Save this session so we can reconnect after a refresh
      try 
      {
        const lastSession = { room, name, role, team };

        // Saves the info locally on phone (5-10 mb)
        localStorage.setItem("couchcodes_lastSession", JSON.stringify(lastSession)); 
      } 
      catch (e)
      {
        console.warn("Failed to save last session:", e);
      }

      joinScreen.style.display = "none"; // Hide the join screen
      lobbyScreen.style.display  = "block"; // Show the lobby screen
      guesserScreen.style.display = "none";
      clueScreen.style.display    = "none";

      if (lobbyInfo) {
        const roleLabel = role === "clue" ? "CLUE MASTER" : "GUESSER";

        // Replaces the lobby text with structured HTML
        lobbyInfo.innerHTML = 
        ` <div class="lobby-badges">
            <span class="pill pill-room">ROOM <span class="code">${room}</span></span>
            <span class="pill pill-${team}">${team.toUpperCase()}</span>
            <span class="pill pill-role">${roleLabel}</span>
          </div>
          <div class="lobby-status">
            <span class="dot"></span>
            Waiting for the host to start...
          </div>
        `;

      }
    });

    socket.on("joinError", (message) => {
      console.log("joinError:", message);
      outputParagraph.textContent = message;

      // If the room is gone or host is missing, delete saved session
      const shouldClear =
        message.includes("Host hasn't") ||
        message.includes("Room does not exist") ||
        message.includes("room") && message.includes("closed");

      if (shouldClear) {
        try { localStorage.removeItem("couchcodes_lastSession"); } catch (e) {}
        savedSession = null;
      }

      joinScreen.style.display = "block";
      guesserScreen.style.display = "none";
      clueScreen.style.display = "none";
    });


    socket.on("gameStarted", ({room}) => {
      if(myRoom && room != myRoom) // Return if started for a different room
        return;

      lobbyScreen.style.display = "none";

      if (myRole === "guesser") { // Show the guesser screen
        guesserScreen.style.display = "block";
        clueScreen.style.display = "none";
      } 
      else if (myRole === "clue") { // Show the Clue Master screen
        clueScreen.style.display = "block";
        guesserScreen.style.display = "none";
      } 
      else { // If I add other roles in the future
        guesserScreen.style.display = "none";
        clueScreen.style.display = "none";
      }
    });

    socket.on("boardState", ({ room, cards }) => {
      if (myRoom && room !== myRoom) return;

      console.log("Received boardState:", room, cards);

      //*** GUESSER BOARD ***// 
      guesserBoard.innerHTML = ""; // Clear the previous board

      cards.sort((a, b) => a.index - b.index); // Sort the cards by index (in ascending order)

      cards.forEach(card => {
        // Outer card container
        const el = document.createElement("div");
        el.className = "card";
        el.dataset.cardId = card.id;

        // Guess button for each card
        const guessBtn = document.createElement("button");
        guessBtn.className = "card-guess-btn";
        guessBtn.textContent = "Guess";
        guessBtn.disabled = !canGuessNow; // Check current turn state

        // Word area
        const wordEl = document.createElement("div");
        wordEl.className = "card-word";
        wordEl.textContent = card.word;
        
        // Highlight 
        el.addEventListener("click", () => {
          if (!canGuessNow) return; // If user can't guess, he can't highlight

          el.classList.toggle("highlighted");          

          const nowHighlighted = el.classList.contains("highlighted"); // Check the state of the card (Highlighted or not)

          socket.emit("highlightCard", { // Send highlighting to Unity
            room: myRoom,
            team: myTeam,
            cardId: card.id,
            highlighted: nowHighlighted
          });
        });

        // Click on guess button -> submit this card as a guess
        guessBtn.addEventListener("click", (event) => {
          event.stopPropagation(); // Stop the highlight if guessing

          if (!canGuessNow) {
            console.log("Cannot guess right now.");
            return;
          }

          const confirmed = confirm(`Are you sure you want to guess?`);
          if (!confirmed) return;

          console.log("Emitting guessCard:", {
            room: myRoom,
            team: myTeam,
            cardId: card.id
          });

          socket.emit("guessCard", {
            room: myRoom,
            team: myTeam,
            cardId: card.id
          });

          // Optionally disable the button until the next turn update
          //guessBtn.disabled = true;
        });

        // Create the card
        el.appendChild(wordEl);
        el.appendChild(guessBtn);

        // Add to board
        guesserBoard.appendChild(el);
      });

      //*** CLUE MASTER BOARD ***//
      if (myRole === "clue" && clueAnswerBoard) {
      clueAnswerBoard.innerHTML = "";

      cards.forEach(card => {
        const el = document.createElement("div");
        el.className = "card clue-card";
        el.dataset.cardId = card.id;
        el.textContent = card.word;

        switch (card.owner) {
          case "red":
            el.classList.add("card-red");
            break;
          case "blue":
            el.classList.add("card-blue");
            break;
          case "bomb":
            el.classList.add("card-bomb");
            break;
          case "neutral":
          default:
            el.classList.add("card-neutral");
            break;
        }

        clueAnswerBoard.appendChild(el);
      });
    }


    });

    socket.on("turnStateUpdate", ({ activeTeam, phase, guessesRemaining }) => {
      const isMyTeam = (myTeam === activeTeam);

      const isMyTurnToGuess = isMyTeam && myRole === "guesser" && phase === "WaitingForGuesses"; // Guessers
      const isMyTurnToClue = isMyTeam && myRole === "clue" && phase === "WaitingForClue"; // Clue - Masters

      canGuessNow = isMyTurnToGuess;
      canSubmitClueNow = isMyTurnToClue;

      const guessButtons = document.querySelectorAll(".card-guess-btn"); 
      guessButtons.forEach(btn => { btn.disabled = !canGuessNow; }) // If the user can't guess, disable the guess button

      // Show board only when it's my turn to guess
      if (isMyTurnToGuess) {
        guesserBoard.classList.remove("board-hidden");
      } 
      else {
        guesserBoard.classList.add("board-hidden");
      }

      if (endGuessBtn) {
        endGuessBtn.disabled = !isMyTurnToGuess;
        endGuessBtn.style.display = isMyTurnToGuess ? "inline-block" : "none";
      }

      // Toggle clue input
      if (submitClueBtn) submitClueBtn.disabled = !canSubmitClueNow;
      if (clueWordInput) clueWordInput.disabled = !canSubmitClueNow;
      if (clueNumberInput) clueNumberInput.disabled = !canSubmitClueNow;

      if (!turnStatusLabel) return;

      if (phase === "GameOver") {
        // Ensure we’re on a game screen
        lobbyScreen.style.display = "none";
        joinScreen.style.display = "none";

        // Show the appropriate screen for the role so the label is visible
        if (myRole === "guesser") {
          guesserScreen.style.display = "block";
          clueScreen.style.display = "none";
        } else if (myRole === "clue") {
          clueScreen.style.display = "block";
          guesserScreen.style.display = "none";
        }

        turnStatusLabel.textContent = "Game over.";
        return;
      }


      if (myRole === "guesser") {
        if (isMyTurnToGuess) {
          turnStatusLabel.textContent = `Your team: time to guess! (${guessesRemaining} guess${guessesRemaining === 1 ? "" : "es"} left)`;
        } 
        else if (isMyTeam && phase === "WaitingForClue") {
          // My team, but waiting for our clue master
          turnStatusLabel.textContent = "Waiting for a clue from your clue master...";
        } 
        else if (!isMyTeam && phase === "WaitingForClue") {
          // Other team, waiting for their clue
          turnStatusLabel.textContent = `Waiting for the ${activeTeam.toUpperCase()} clue master to give a clue...`;
        } 
        else if (!isMyTeam && phase === "WaitingForGuesses") {
          // Other team is guessing
          turnStatusLabel.textContent = `Waiting for the ${activeTeam.toUpperCase()} team to guess...`;
        } 
        else { 
          turnStatusLabel.textContent = "";
        }
      }
    });

    socket.on("cardRevealed", ({ room, cardId }) => {
      if (myRoom && room !== myRoom) return;

      // Clear guesser board
      const cardEl = guesserBoard.querySelector(`[data-card-id="${cardId}"]`);
      if (cardEl) {
        cardEl.innerHTML = "";
        cardEl.classList.add("card-empty");
      }

      // Clear C.M. board
      if (clueAnswerBoard) {
        const answerCardEl = clueAnswerBoard.querySelector(`[data-card-id="${cardId}"]`);
        if (answerCardEl) {
          answerCardEl.innerHTML = "";
          answerCardEl.classList.add("card-empty");
        }
      }
    });

    socket.on("clearHighlights", ({ room }) => {
      if (myRoom && room !== myRoom) return;

      const highlightedCards = document.querySelectorAll(".card.highlighted");
      highlightedCards.forEach(el => {
        el.classList.remove("highlighted");
      });
    });

    socket.on("gameOver", ({ room, winningTeam, reason }) => {
      if (myRoom && room !== myRoom) return;

      // Hide the board
      guesserBoard.classList.add("board-hidden");

      // Disable all guess buttons
      const guessButtons = document.querySelectorAll(".card-guess-btn");
      guessButtons.forEach(btn => btn.disabled = true);

      // Create winner/loser message
      const winnerUpper = winningTeam ? winningTeam.toUpperCase() : "";
      const loserUpper = winningTeam === "red" ? "BLUE" : "RED";

      let message = `The ${winnerUpper} team won.`;

      if (reason === "bomb")
      {
        message = `The ${winnerUpper} team won because the ${loserUpper} team pressed the bomb.`;
      }

      else if (reason === "cards")
      {
        message = `The ${winnerUpper} team won by guessing all their words.`;
      }

      if (turnStatusLabel)
      {
        turnStatusLabel.textContent = message;
      }
    });

    //let selectedRole = null;

    const roleButtons = document.querySelectorAll("button[data-role]"); // Find all button elements in the page that have a data-role attribute

    roleButtons.forEach(btn => {
        btn.addEventListener("click", () => {
        
        selectedRole = btn.dataset.role; // store selected role

        roleButtons.forEach(b => b.classList.remove("selected")); // clear others, mark this
        btn.classList.add("selected");

        console.log("Selected role:", selectedRole);
        });
    });

    document.getElementById("joinBtn").addEventListener("click", () => {
      // Prefer current UI inputs, fallback to saved session if available
      const nameInput = document.getElementById("playerName").value.trim();
      const roomInput = document.getElementById("roomCode").value.trim();
      const teamInput = document.getElementById("team").value;

      const name = nameInput || savedSession?.name;
      const room = roomInput || savedSession?.room;
      const team = teamInput || savedSession?.team;
      const role = selectedRole || savedSession?.role;

      if (!name || !room || !role || !team) {
        outputParagraph.textContent = "Please fill name, room, role and team.";
        return;
      }

      const payload = { name, room, role, team };
      console.log("Emitting joinRoom:", payload);
      socket.emit("joinRoom", payload);
      outputParagraph.textContent = "Joining room...";
    });

    submitClueBtn.addEventListener("click", () => {
      if (myRole !== "clue") { // If a non clue master sends a clue -> return
        console.log("Only clue masters can submit a clue.");
        return;
      }

      if (!canSubmitClueNow) { // If you send a clue on the wrong turn -> return
        alert("It is not your team's turn to give a clue right now.\n" + "Wait until it is your team's turn!");
        return;
      }

      const clueWord = clueWordInput.value.trim();
      const clueNumber = clueNumberInput.value;

      if (!clueWord) { // If the field is empty -> return
        alert("Please enter a clue word.");
        return;
      }

      if (!myRoom) { // If there's no room -> return
        console.warn("No room stored yet, can't submit clue.");
        return;
      }

      const payload = { room: myRoom, clueWord, clueNumber };
      console.log("Emitting submitClue:", payload);
      socket.emit("submitClue", payload);
    });

    endGuessBtn.addEventListener("click", () => {
      if (!canGuessNow) {
        alert("It is not your team's turn to guess.");
        return;
      }

      if (!myRoom) {
        console.warn("No room stored yet, can't end guessing.");
        return;
      }

      const confirmed = confirm("End your team's guessing turn?");
      if (!confirmed) return;

      console.log("Emitting endGuessing:", { room: myRoom, team: myTeam });
      socket.emit("endGuessing", { room: myRoom, team: myTeam });
    });
  </script>
</body>
</html>
